<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>saecio</title>
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<template id="__bundler_thumbnail">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 80">
  <rect width="120" height="80" fill="#F5F2EC"/>
  <rect x="36" y="14" width="48" height="52" rx="4" fill="#2C3A3A"/>
  <path d="M60 28L72 32V42C72 50 66 54 60 57C54 54 48 50 48 42V32L60 28Z" fill="#C4614A"/>
  <path d="M55 42l4 4 6-7" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
</template>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; background: #F5F2EC; }
body { font-family: 'Sora', sans-serif; font-weight: 400; }
#root { width: 100%; height: 100dvh; position: relative; max-width: 480px; margin: 0 auto; }
@keyframes pulse-line { 0%,100%{transform:scaleX(0.2);opacity:0.3} 50%{transform:scaleX(1);opacity:1} }
@keyframes stamp { 0%{transform:scale(1.5) rotate(-6deg);opacity:0} 65%{transform:scale(0.95) rotate(1deg);opacity:1} 100%{transform:scale(1) rotate(0deg);opacity:1} }
@keyframes fade-up { from{transform:translateY(16px);opacity:0} to{transform:translateY(0);opacity:1} }
@keyframes fade-in { from{opacity:0} to{opacity:1} }
@keyframes spin { to{transform:rotate(360deg)} }
@keyframes splash-out { 0%{opacity:1;transform:scale(1)} 100%{opacity:0;transform:scale(1.04)} }
.scroll::-webkit-scrollbar{display:none}
.scroll{-ms-overflow-style:none;scrollbar-width:none}
input,select,textarea{font-family:'Sora',sans-serif;font-weight:400;outline:none;-webkit-appearance:none}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

const T = {
  clay:'#C4614A', slate:'#2C3A3A', linen:'#F5F2EC',
  linenDark:'#EAE5DC', white:'#FFFFFF',
  green:'#4A7C59', muted:'rgba(44,58,58,0.45)',
  faint:'rgba(44,58,58,0.06)', border:'rgba(44,58,58,0.1)',
};

const f = (size, weight=400) => ({
  fontFamily:"'Sora', sans-serif",
  fontSize: size,
  fontWeight: Math.min(weight, 400),
});

const priceStyle = (size=13) => ({
  ...f(size, 400),
  textTransform:'uppercase',
  letterSpacing:'0.06em',
  color: T.slate,
});

/* ── Shield ── */
function ShieldIcon({ size=14, color=T.clay }) {
  return (
    <svg width={size} height={size*1.15} viewBox="0 0 16 18" fill="none">
      <path d="M8 1L14.5 3.5V9C14.5 13 11 15.5 8 17C5 15.5 1.5 13 1.5 9V3.5L8 1Z" fill={color}/>
      <path d="M5.5 9L7.5 11L10.5 7" stroke="white" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
    </svg>
  );
}

/* ── Verified Badge ── */
function VerifiedBadge({ small }) {
  return (
    <span style={{
      display:'inline-flex', alignItems:'center', gap:4,
      background:T.slate, color:T.white,
      ...f(small ? 9 : 10, 400),
      letterSpacing:'0.1em', textTransform:'uppercase',
      padding: small ? '3px 7px' : '4px 10px',
      borderRadius: 3,
    }}>
      <ShieldIcon size={small ? 9 : 10} color={T.white}/>
      Digitally Verified
    </span>
  );
}

/* ── Back Arrow ── */
function BackArrow({ onPress }) {
  return (
    <button onClick={onPress} style={{
      background:'none', border:'none', cursor:'pointer',
      display:'flex', alignItems:'center', gap:6,
      ...f(13,400), color:T.slate, padding:'4px 0', letterSpacing:'0.02em',
    }}>
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M10 3L5 8L10 13" stroke={T.slate} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
      </svg>
      Terug
    </button>
  );
}

/* ── Bottom Nav — SELL | BROWSE | SAVED ── */
function BottomNav({ active, onNav }) {
  const tabs = [
    { id:'sell',      label:'SELL',   Icon: PlusIcon },
    { id:'catalogue', label:'BROWSE', Icon: GridIcon },
    { id:'saved',     label:'SAVED',  Icon: HeartIcon },
    { id:'profile',   label:'PROFILE',Icon: PersonIcon },
  ];
  return (
    <div style={{ height:72, background:T.white, borderTop:`1px solid ${T.border}`, display:'flex', alignItems:'center', flexShrink:0 }}>
      {tabs.map(({ id, label, Icon }) => {
        const active_ = active === id;
        return (
          <button key={id} onClick={() => onNav(id)} style={{
            flex:1, background:'none', border:'none', cursor:'pointer',
            display:'flex', flexDirection:'column', alignItems:'center', gap:5, padding:'8px 0',
          }}>
            <Icon active={active_}/>
            <span style={{ ...f(9,400), letterSpacing:'0.12em', color: active_ ? T.clay : T.muted, transition:'color 0.15s' }}>{label}</span>
          </button>
        );
      })}
    </div>
  );
}

function PlusIcon({ active }) {
  const c = active ? T.clay : T.muted;
  return (
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
      <circle cx="10" cy="10" r="8" stroke={c} strokeWidth="1.2"/>
      <path d="M10 6V14M6 10H14" stroke={c} strokeWidth="1.2" strokeLinecap="round"/>
    </svg>
  );
}
function GridIcon({ active }) {
  const c = active ? T.clay : T.muted;
  return (
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
      <rect x="2.5" y="2.5" width="6.5" height="6.5" rx="1" stroke={c} strokeWidth="1.2" fill={active ? c : 'none'}/>
      <rect x="11" y="2.5" width="6.5" height="6.5" rx="1" stroke={c} strokeWidth="1.2" fill={active ? c : 'none'}/>
      <rect x="2.5" y="11" width="6.5" height="6.5" rx="1" stroke={c} strokeWidth="1.2" fill={active ? c : 'none'}/>
      <rect x="11" y="11" width="6.5" height="6.5" rx="1" stroke={c} strokeWidth="1.2" fill={active ? c : 'none'}/>
    </svg>
  );
}
function HeartIcon({ active }) {
  const c = active ? T.clay : T.muted;
  return (
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
      <path d="M10 16C10 16 3 11.5 3 7a4 4 0 017-2.65A4 4 0 0117 7c0 4.5-7 9-7 9z"
        fill={active ? c : 'none'} stroke={c} strokeWidth="1.2" strokeLinecap="round"/>
    </svg>
  );
}

function PersonIcon({ active }) {
  const c = active ? T.clay : T.muted;
  return (
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
      <circle cx="10" cy="7" r="3.5" stroke={c} strokeWidth="1.2" fill={active ? c : 'none'}/>
      <path d="M3 18c0-3.9 3.1-6.5 7-6.5s7 2.6 7 6.5" stroke={c} strokeWidth="1.2" strokeLinecap="round"/>
    </svg>
  );
}

function SplashScreen({ onDone }) {
  const [leaving, setLeaving] = useState(false);
  useEffect(() => {
    const t1 = setTimeout(() => setLeaving(true), 1800);
    const t2 = setTimeout(() => onDone(), 2300);
    return () => { clearTimeout(t1); clearTimeout(t2); };
  }, []);
  return (
    <div style={{
      position:'absolute', inset:0, zIndex:999,
      background:T.slate, display:'flex', flexDirection:'column',
      alignItems:'center', justifyContent:'center',
      animation: leaving ? 'splash-out 0.45s ease forwards' : 'none',
    }}>
      <div style={{ animation:'fade-up 0.6s ease 0.2s both', marginBottom:0 }}>
        <img src="/saecio/uploads/saecio_LOGO.png" alt="saecio" style={{ height:128, filter:'brightness(0) invert(1)' }}/>
      </div>
      <div style={{ ...f(14,400), color:'rgba(255,255,255,0.5)', letterSpacing:'0.18em', textTransform:'uppercase', marginTop:-4, animation:'fade-up 0.6s ease 0.4s both' }}>Premium baby gear · Amsterdam</div>
      <div style={{ marginTop:52, width:4, height:4, borderRadius:'50%', background:'rgba(255,255,255,0.2)', animation:'fade-in 0.4s ease 1.1s both' }}/>
    </div>
  );
}

/* ── Dubatti photo block ── */
function DubattiPhoto({ height=240 }) {
  return (
    <div style={{ width:'100%', height, overflow:'hidden', background:'#E8E0D5', position:'relative', flexShrink:0 }}>
      <img src="/saecio/uploads/Screenshot 2026-04-27 at 18.03.11.png" alt="Dubatti Two E2"
        style={{ width:'100%', height:'100%', objectFit:'cover', objectPosition:'center 30%', display:'block' }}/>
      <div style={{ position:'absolute', bottom:10, right:12, ...f(9,300), letterSpacing:'0.12em', textTransform:'uppercase', color:'white', opacity:0.65, textShadow:'0 1px 4px rgba(0,0,0,0.4)' }}>Dubatti Two E2</div>
    </div>
  );
}

/* ══════════════════════════════════════
   SCREEN 1: CATALOGUE
======================================
*/
function CatalogueScreen({ onNav }) {
  const [cat, setCat] = useState('All');
  const [query, setQuery] = useState('');
  const [favorites, setFavorites] = useState({});
  const cats = ['All','Strollers','Car Seats','Carriers','High Chairs','Cribs','Breast Pumps'];

  const ALL_LISTINGS = [
    { id:1, name:'Dubatti Two E2',      category:'Strollers',    location:'Amsterdam', price:589, monthly:49, verified:true,  img:'/saecio/uploads/Screenshot 2026-04-27 at 18.03.11.png', bg:'#E8E0D5', hero:true },
    { id:2, name:'Stokke Tripp Trapp',  category:'High Chairs',  location:'Amsterdam', price:148, monthly:18, verified:true,  img:'/saecio/uploads/Screenshot 2026-04-27 at 18.09.07.png', bg:'#D9CFC0' },
    { id:3, name:'Bugaboo Fox 5',       category:'Strollers',    location:'Utrecht',   price:420, monthly:38, verified:false, img:'/saecio/uploads/Bugga.png', bg:'#C5C8C6' },
    { id:4, name:'Maxi-Cosi Pebble',    category:'Car Seats',    location:'Haarlem',   price:195, monthly:22, verified:true,  img:'/saecio/uploads/Screenshot 2026-04-29 at 10.36.33.png', bg:'#C8C3C6' },
    { id:5, name:'BabyBjörn Bouncer',   category:'Cribs',        location:'Rotterdam', price:79,  monthly:9,  verified:false, img:'/saecio/uploads/Bounder.png', bg:'#C4CEC0' },
    { id:6, name:'Ergobaby Carrier',    category:'Carriers',     location:'Amsterdam', price:95,  monthly:11, verified:true,  img:'/saecio/uploads/Screenshot 2026-04-29 at 11.34.25-680cd409.png', bg:'#CEC8C0' },
    { id:7, name:'Stokke Sleepi',       category:'Cribs',        location:'Den Haag',  price:320, monthly:29, verified:true,  img:'/saecio/uploads/Screenshot 2026-04-29 at 11.34.50.png', bg:'#D4CFC8' },
  ];

  const heroItem = ALL_LISTINGS[0];

  const filtered = ALL_LISTINGS.filter(item => {
    if (item.hero) return false;
    const matchCat = cat === 'All' || item.category === cat;
    const matchQ = query === '' || item.name.toLowerCase().includes(query.toLowerCase()) || item.location.toLowerCase().includes(query.toLowerCase());
    return matchCat && matchQ;
  });

  const showHero = (cat === 'All' || cat === 'Strollers') && (query === '' || 'dubatti'.includes(query.toLowerCase()) || 'amsterdam'.includes(query.toLowerCase()));

  function toggleFav(id, e) {
    e.stopPropagation();
    setFavorites(f => ({ ...f, [id]: !f[id] }));
  }

  return (
    <div style={{ display:'flex', flexDirection:'column', height:'100%', background:T.linen }}>
      {/* Header */}
      <div style={{ padding:'16px 20px 12px', flexShrink:0 }}>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:16 }}>
          <div style={{ display:'flex', alignItems:'center' }}>
            <img src="/saecio/uploads/saecio_LOGO.png" alt="saecio" style={{ height:44 }}/>
          </div>
          <button onClick={() => onNav('profile')} style={{ background:'none', border:'none', cursor:'pointer', padding:0 }}>
            <img src="/saecio/uploads/6522516.png" alt="Profile" style={{ width:30, height:30, opacity:0.65 }}/>
          </button>
        </div>

        {/* Search */}
        <div style={{ display:'flex', alignItems:'center', gap:10, background:T.white, borderRadius:6, padding:'11px 14px', border:`1px solid ${query ? T.clay : T.border}`, marginBottom:14, transition:'border-color 0.15s' }}>
          <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
            <circle cx="6.5" cy="6.5" r="5" stroke={query ? T.clay : T.muted} strokeWidth="1.2"/>
            <path d="M10.5 10.5L13.5 13.5" stroke={query ? T.clay : T.muted} strokeWidth="1.2" strokeLinecap="round"/>
          </svg>
          <input
            value={query}
            onChange={e => setQuery(e.target.value)}
            placeholder="Search in Amsterdam…"
            style={{ flex:1, border:'none', background:'transparent', ...f(13,400), color:T.slate, outline:'none' }}
          />
          {query !== '' && (
            <button onClick={() => setQuery('')} style={{ background:'none', border:'none', cursor:'pointer', ...f(12,300), color:T.muted, padding:0 }}>✕</button>
          )}
        </div>

        {/* Category pills */}
        <div style={{ display:'flex', gap:7, overflowX:'auto', paddingBottom:2 }} className="scroll">
          {cats.map(c => (
            <button key={c} onClick={() => setCat(c)} style={{
              flexShrink:0, padding:'6px 13px', borderRadius:3, cursor:'pointer',
              ...f(11,400), letterSpacing:'0.07em', textTransform:'uppercase',
              background: cat===c ? T.slate : 'transparent',
              color: cat===c ? T.white : T.muted,
              border:`1px solid ${cat===c ? T.slate : T.border}`,
              transition:'all 0.15s',
            }}>{c}</button>
          ))}
        </div>
      </div>

      {/* Listings */}
      <div className="scroll" style={{ flex:1, overflowY:'auto', padding:'0 20px 20px' }}>

        {/* Hero — Dubatti Two E2 */}
        {showHero && (
          <div style={{ position:'relative', marginBottom:12 }}>
            <div onClick={() => onNav('passport')} style={{ background:T.white, borderRadius:8, overflow:'hidden', cursor:'pointer', boxShadow:'0 1px 8px rgba(44,58,58,0.07)' }}>
              <div style={{ width:'100%', height:230, overflow:'hidden', background:'#E8E0D5', position:'relative', flexShrink:0 }}>
                <img src="/saecio/uploads/Screenshot 2026-04-27 at 18.03.11.png" alt="Dubatti Two E2" style={{ width:'100%', height:'100%', objectFit:'cover', objectPosition:'center 30%', display:'block' }}/>
                <div style={{ position:'absolute', bottom:10, right:12, ...f(9,300), letterSpacing:'0.12em', textTransform:'uppercase', color:'white', opacity:0.65, textShadow:'0 1px 4px rgba(0,0,0,0.4)' }}>Dubatti Two E2</div>
              </div>
              <div style={{ padding:'14px 16px 16px' }}>
                <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:10 }}>
                  <VerifiedBadge/>
                  <span style={{ ...f(10,400), color:T.green, letterSpacing:'0.05em', background:'rgba(74,124,89,0.08)', padding:'3px 9px', borderRadius:3 }}>12 saved</span>
                </div>
                <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-end' }}>
                  <div>
                    <div style={{ ...f(16,400), color:T.slate, letterSpacing:'-0.01em', marginBottom:3 }}>Dubatti Two E2</div>
                    <div style={{ ...f(11,300), color:T.muted, letterSpacing:'0.04em' }}>Like new · Amsterdam Oud-Zuid</div>
                  </div>
                  <div style={{ textAlign:'right' }}>
                    <div style={{ ...priceStyle(15), color:T.clay }}>FROM €49/MO</div>
                    <div style={{ ...f(10,300), color:T.muted, marginTop:3, letterSpacing:'0.04em' }}>or €589 to buy</div>
                  </div>
                </div>
                <div style={{ marginTop:12, padding:'9px 12px', borderRadius:5, background:T.faint, display:'flex', alignItems:'center', gap:8, borderLeft:`2px solid ${T.slate}` }}>
                  <ShieldIcon size={13} color={T.slate}/>
                  <span style={{ ...f(11,400), color:T.slate, letterSpacing:'0.02em' }}>Safety Passport available — 5-point inspection</span>
                </div>
              </div>
            </div>
            {/* Fav button hero */}
            <button onClick={(e) => toggleFav(1, e)} style={{
              position:'absolute', top:12, left:12,
              width:32, height:32, borderRadius:'50%', border:'none', cursor:'pointer',
              background: favorites[1] ? T.clay : 'rgba(255,255,255,0.88)',
              display:'flex', alignItems:'center', justifyContent:'center',
              boxShadow:'0 1px 6px rgba(0,0,0,0.12)', transition:'all 0.2s',
            }}>
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                <path d="M7 12C7 12 1.5 8.5 1.5 5a3 3 0 015.5-1.65A3 3 0 0112.5 5c0 3.5-5.5 7-5.5 7z"
                  fill={favorites[1] ? T.white : 'none'} stroke={favorites[1] ? T.white : T.slate} strokeWidth="1.2"/>
              </svg>
            </button>
          </div>
        )}

        {/* No results */}
        {filtered.length === 0 && (
          <div style={{ textAlign:'center', padding:'40px 20px' }}>
            <div style={{ ...f(13,400), color:T.muted, letterSpacing:'0.02em' }}>No results for "{query}"</div>
          </div>
        )}

        {/* Section label */}
        {filtered.length > 0 && (
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:10 }}>
            <span style={{ ...f(9,400), letterSpacing:'0.14em', textTransform:'uppercase', color:T.muted }}>
              {query ? `${filtered.length} results` : 'More listings'}
            </span>
            <span style={{ ...f(11,400), color:T.clay, letterSpacing:'0.04em' }}>All {ALL_LISTINGS.length - 1} →</span>
          </div>
        )}

        {/* Grid */}
        <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:8 }}>
          {filtered.map(item => (
            <div key={item.id} style={{ background:T.white, borderRadius:7, overflow:'hidden', cursor:'pointer', boxShadow:'0 1px 4px rgba(44,58,58,0.05)', position:'relative' }}>
              {item.img ? (
                <div style={{ height:148, overflow:'hidden', background:item.bg }}>
                  <img src={item.img} alt={item.name} style={{ width:'100%', height:'100%', objectFit:'cover', objectPosition:'center', display:'block' }}/>
                </div>
              ) : (
                <div style={{ height:148, background:item.bg, display:'flex', alignItems:'center', justifyContent:'center', ...f(11,300), color:'rgba(44,58,58,0.2)', letterSpacing:'0.04em' }}>Foto</div>
              )}
              {/* Fav button */}
              <button onClick={(e) => toggleFav(item.id, e)} style={{
                position:'absolute', top:8, left:8,
                width:28, height:28, borderRadius:'50%', border:'none', cursor:'pointer',
                background: favorites[item.id] ? T.clay : 'rgba(255,255,255,0.88)',
                display:'flex', alignItems:'center', justifyContent:'center',
                boxShadow:'0 1px 5px rgba(0,0,0,0.1)', transition:'all 0.2s',
              }}>
                <svg width="12" height="12" viewBox="0 0 14 14" fill="none">
                  <path d="M7 12C7 12 1.5 8.5 1.5 5a3 3 0 015.5-1.65A3 3 0 0112.5 5c0 3.5-5.5 7-5.5 7z"
                    fill={favorites[item.id] ? T.white : 'none'} stroke={favorites[item.id] ? T.white : T.slate} strokeWidth="1.2"/>
                </svg>
              </button>

              <div style={{ padding:'9px 11px 12px' }}>
                <div style={{ ...f(12,400), color:T.slate, marginBottom:4, letterSpacing:'-0.01em' }}>{item.name}</div>
                <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom: item.verified ? 7 : 0 }}>
                  <span style={{ ...f(10,300), color:T.muted, letterSpacing:'0.03em' }}>{item.location}</span>
                  <div style={{ textAlign:'right' }}>
                    <div style={{ ...priceStyle(11), color:T.clay }}>from €{item.monthly}/mo</div>
                    <div style={{ ...f(9,300), color:T.muted, marginTop:2, letterSpacing:'0.03em' }}>€{item.price} buy</div>
                  </div>
                </div>
                {item.verified && <VerifiedBadge small/>}
              </div>
            </div>
          ))}
        </div>
        <div style={{ height:8 }}/>
      </div>

      <BottomNav active="catalogue" onNav={onNav}/>
    </div>
  );
}

/* ══════════════════════════════════════
   SCREEN 2: SAFETY PASSPORT
*/
const TIMELINE = [
  { step:1, label:'Listed',           date:'14 Jan 2026', desc:'Seller submitted the item. Serial number, age and purchase receipt uploaded.', done:true },
  { step:2, label:'Digitally Verified',date:'15 Jan 2026', desc:'Serial number cross-referenced with manufacturer database. No recall flags detected.', done:true },
  { step:3, label:'Inspection',       date:'Scheduled',   desc:'Physical inspection by a certified saecio technician. Frame, harness, brakes and fabric.', done:false },
  { step:4, label:'Certified Safe',   date:'Pending',     desc:'Full safety certificate issued. Component-level grade assigned.', done:false },
  { step:5, label:'Ready for Delivery',date:'Pending',    desc:'Cleaned, packaged and ready for handover or shipping.', done:false },
];

function SafetyPassportScreen({ onNav }) {
  const [tab, setTab] = useState('passport');

  return (
    <div style={{ display:'flex', flexDirection:'column', height:'100%', background:T.linen }}>
      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'16px 20px 12px', flexShrink:0 }}>
        <BackArrow onPress={() => onNav('catalogue')}/>

const STEPS = ['Details', 'Photos', 'Price'];

function SellWizardScreen({ onNav, onSuccess }) {
  const [step, setStep] = useState(1);
  const [price, setPrice] = useState('');
  const [loading, setLoading] = useState(false);
  const payout = price ? Math.round(Number(price) * 0.92) : 0;
  const commission = price ? Math.round(Number(price) * 0.08) : 0;

  function submit() {
    setLoading(true);
    setTimeout(() => { setLoading(false); onSuccess(); }, 1500);
  }

  return (
    <div style={{ display:'flex', flexDirection:'column', height:'100%', background:T.linen }}>
      <div style={{ padding:'16px 20px 14px', flexShrink:0 }}>
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:16 }}>
          <BackArrow onPress={() => step > 1 ? setStep(s => s-1) : onNav('catalogue')}/>
          <span style={{ ...f(10,400), letterSpacing:'0.12em', textTransform:'uppercase', color:T.muted }}>Step {step} of {STEPS.length}</span>
          <button onClick={() => onNav('catalogue')} style={{ background:'none', border:'none', cursor:'pointer', ...f(12,300), color:T.muted }}>Cancel</button>
        </div>
        <div style={{ height:2, background:T.border, borderRadius:1, overflow:'hidden' }}>
          <div style={{ height:'100%', background:T.clay, width:`${step===1?33:step===2?66:100}%`, transition:'width 0.45s cubic-bezier(0.4,0,0.2,1)' }}/>
        </div>
        <div style={{ display:'flex', justifyContent:'space-between', marginTop:6 }}>
          {STEPS.map((s,i) => (
            <span key={s} style={{ ...f(10,400), letterSpacing:'0.06em', color: i+1<=step ? T.clay : T.muted, transition:'color 0.2s' }}>{s}</span>
          ))}
        </div>
      </div>

      <div className="scroll" style={{ flex:1, overflowY:'auto', padding:'0 20px' }}>
        {step === 1 && <WizardStep1/>}
        {step === 2 && <WizardStep2/>}
        {step === 3 && <WizardStep3 price={price} setPrice={setPrice} payout={payout} commission={commission}/>}
      </div>

      <div style={{ padding:'12px 20px 28px', background:T.white, borderTop:`1px solid ${T.border}`, flexShrink:0 }}>
        {step < 3 ? (
          <button onClick={() => setStep(s => s+1)} style={{ width:'100%', padding:'15px', borderRadius:6, border:'none', cursor:'pointer', background:T.clay, color:T.white, ...f(11,400), letterSpacing:'0.14em', textTransform:'uppercase' }}>
            Continue
          </button>
        ) : (
          <button onClick={submit} disabled={loading} style={{
            width:'100%', padding:'15px', borderRadius:6, border:'none', cursor: loading ? 'default' : 'pointer',
            background: loading ? 'rgba(44,58,58,0.25)' : T.clay, color:T.white,
            ...f(11,400), letterSpacing:'0.14em', textTransform:'uppercase',
            display:'flex', alignItems:'center', justifyContent:'center', gap:10, transition:'background 0.2s',
          }}>
            {loading ? (
              <><div style={{ width:14, height:14, border:'1.5px solid rgba(255,255,255,0.3)', borderTopColor:'white', borderRadius:'50%', animation:'spin 0.8s linear infinite' }}/> Submitting…</>
            ) : 'Submit for verification'}
          </button>
        )}
      </div>
    </div>
  );
}

  return (
    <div style={{ height:'100%', background:T.slate, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding:'40px 32px' }}>
      <div style={{ flex:1, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', width:'100%' }}>

            <path d="M60 12L102 28V68C102 96 78 116 60 124C42 116 18 96 18 68V28L60 12Z" fill="rgba(255,255,255,0.06)"/>

          </svg>
        </div>

        {phase>=2 && (
          <div style={{ textAlign:'center', animation:'fade-up 0.5s ease 0.1s both', width:'100%' }}>
            <div style={{ ...f(27,400), color:T.white, letterSpacing:'-0.03em', marginBottom:8 }}>Listing received</div>
            <div style={{ height:2, background:T.clay, margin:'0 auto 20px', width:'48%', borderRadius:1, animation:'pulse-line 2.5s ease-in-out infinite', transformOrigin:'center' }}/>
            <div style={{ ...f(13,300), color:'rgba(255,255,255,0.55)', lineHeight:1.7, maxWidth:270, margin:'0 auto 26px', letterSpacing:'0.02em' }}>
              Your item is now in the saecio verification queue. We'll contact you within 48 hours to arrange an inspection.
            </div>
            <div style={{ padding:'12px 20px', borderRadius:5, background:'rgba(255,255,255,0.06)', border:'1px solid rgba(255,255,255,0.1)', marginBottom:26, display:'inline-block' }}>

            </div>
            {['Inspection scheduled within 48h','Safety Passport issued after review','Go live on the marketplace'].map((s,i) => (

   APP ROOT
*/
function App() {
  const [screen, setScreen] = useState('splash');

  function go(dest) { setScreen(dest); }

  return (
    <div style={{ width:'100%', height:'100dvh', background:T.linen, overflow:'hidden', position:'relative' }}>
      {screen === 'splash'    && <SplashScreen onDone={() => go('catalogue')}/>}
      {screen === 'catalogue' && <CatalogueScreen onNav={go}/>}
      {screen === 'passport'  && <SafetyPassportScreen onNav={go}/>}
      {screen === 'request'   && <BuyerRequestScreen onNav={go} onSuccess={() => go('buySuccess')}/>}
      {screen === 'buySuccess'&& <BuyerSuccessScreen onNav={go}/>}
      {screen === 'sell'      && <SellWizardScreen onNav={go} onSuccess={() => go('success')}/>}
      {screen === 'success'   && <SuccessScreen onNav={go}/>}
      {screen === 'profile'   && <ProfileScreen onNav={go}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
